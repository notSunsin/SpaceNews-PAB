name: spacenews_core
description: "SpaceNews Core - Advanced International News Portal"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Local storage (session handling)
  shared_preferences: ^2.3.2

  # REST API (Spaceflight News API v4)
  http: ^1.2.2

  # Date formatting for "published_at"
  intl: ^0.19.0

  # Image loading + graceful fallback/caching for network news images
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
